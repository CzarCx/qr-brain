<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Sin conexión — Sistema de Control</title>
  <!-- Página 100% autocontenida (estilos y script en línea, sin chunks de Next):
       así sirve de fallback de navegación offline sin romperse entre despliegues. -->
  <style>
    :root { --green:#006241; --dark:#1e3932; --cream:#f5f7f9; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html,body { margin:0; height:100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--cream); color: var(--dark);
      display:flex; align-items:center; justify-content:center; padding:24px;
      overscroll-behavior-y: contain;
    }
    .card {
      background:#fff; border-radius:28px; padding:32px 26px; max-width:400px; width:100%;
      box-shadow:0 20px 45px rgba(0,0,0,.12); text-align:center;
    }
    .icon { width:76px; height:76px; margin:0 auto 18px; border-radius:50%;
      background:#e6f0ec; display:flex; align-items:center; justify-content:center; }
    .icon svg { width:38px; height:38px; stroke:var(--green); }
    h1 { font-size:22px; font-weight:800; margin:0 0 8px; letter-spacing:-.01em; }
    p { font-size:14px; color:#5b6b66; line-height:1.5; margin:0 0 6px; }
    .status { margin-top:16px; font-size:12px; font-weight:800; text-transform:uppercase;
      letter-spacing:.12em; color:#b0895a; }
    .status.online { color: var(--green); }
    button {
      margin-top:22px; width:100%; height:52px; border:none; border-radius:16px;
      background:var(--green); color:#fff; font-size:13px; font-weight:800;
      letter-spacing:.14em; text-transform:uppercase; cursor:pointer;
      transition:background .15s, transform .1s;
    }
    button:active { transform:scale(.98); }
    .hint { margin-top:14px; font-size:11px; color:#9aa8a3; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No hay señal en este momento. Tus escaneos guardados están a salvo y se sincronizarán solos cuando vuelva la red.</p>
    <p class="status" id="status">Esperando conexión…</p>
    <button id="retry" type="button">Reintentar</button>
    <p class="hint">Se reintenta solo al recuperar la señal.</p>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById('status');
      var retryEl = document.getElementById('retry');

      function volver() {
        // Al recargar con red, el service worker sirve la app real de nuevo.
        location.reload();
      }
      function pintarEstado() {
        if (navigator.onLine) {
          statusEl.textContent = 'Conexión recuperada — recargando…';
          statusEl.className = 'status online';
          volver();
        } else {
          statusEl.textContent = 'Esperando conexión…';
          statusEl.className = 'status';
        }
      }
      retryEl.addEventListener('click', volver);
      window.addEventListener('online', pintarEstado);
      pintarEstado();
    })();
  </script>
</body>
</html>
